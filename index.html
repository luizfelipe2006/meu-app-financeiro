<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>App Financeiro</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">

<h1>💰 App Financeiro</h1>

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button class="sec" onclick="cadastrar()">Criar Conta</button>

<p id="erro"></p>

</div>

<!-- APP -->
<div id="appBox" class="hidden">

<header>
<h3 id="userName"></h3>

<div>
<button onclick="toggleTema()">🌙</button>
<button onclick="logout()">Sair</button>
</div>
</header>

<div class="container">

<h2>Sua Planilha</h2>

<input type="text" id="linkPlanilha" placeholder="Cole o link da planilha Google">

<button onclick="salvarPlanilha()">Salvar</button>

<iframe id="framePlanilha"></iframe>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
